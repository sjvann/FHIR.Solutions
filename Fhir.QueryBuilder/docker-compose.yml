version: '3.8'

services:
  fhir-query-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fhir-query-builder
    environment:
      - DOTNET_ENVIRONMENT=Development
      - FHIR_QUERY_BUILDER_DEFAULT_SERVER_URL=http://fhir-server:8080/fhir
      - FHIR_QUERY_BUILDER_ENABLE_LOGGING=true
      - FHIR_QUERY_BUILDER_ENABLE_CACHING=true
      - FHIR_QUERY_BUILDER_REQUEST_TIMEOUT_SECONDS=30
    volumes:
      - ./data/QueryHistory:/app/QueryHistory
      - ./data/Exports:/app/Exports
      - ./data/ConfigBackups:/app/ConfigBackups
      - ./logs:/app/logs
    networks:
      - fhir-network
    depends_on:
      - fhir-server
    restart: unless-stopped
    # Note: GUI applications typically don't work well in containers
    # This is mainly for development/testing purposes

  # Example FHIR server for testing
  fhir-server:
    image: hapiproject/hapi:latest
    container_name: fhir-server
    ports:
      - "8080:8080"
    environment:
      - SPRING_CONFIG_LOCATION=classpath:/application.yaml,classpath:/application-docker.yaml
      - HAPI_FHIR_VERSION=R4
      - HAPI_FHIR_VALIDATION_REQUESTS_ENABLED=true
      - HAPI_FHIR_SUBSCRIPTION_RESTHOOK_ENABLED=true
    volumes:
      - fhir-data:/data/hapi
      - ./config/hapi:/app/config
    networks:
      - fhir-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: fhir-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fhir-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for HAPI FHIR (optional)
  postgres:
    image: postgres:15-alpine
    container_name: fhir-postgres
    environment:
      - POSTGRES_DB=hapi
      - POSTGRES_USER=hapi
      - POSTGRES_PASSWORD=hapi123
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - fhir-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: fhir-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - fhir-network
    depends_on:
      - fhir-server
    restart: unless-stopped

volumes:
  fhir-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  fhir-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
