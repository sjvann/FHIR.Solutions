name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'FHIRQueryBuilder/**'
      - 'FhirServerHelper/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'FHIRQueryBuilder/**'
      - 'FhirServerHelper/**'
  release:
    types: [ published ]

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'FHIRQueryBuilder'
  TEST_PROJECT_PATH: 'FHIRQueryBuilder.Tests'

jobs:
  test:
    name: Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
      
    - name: Build
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore
      
    - name: Test
      run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
      
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        directory: ./coverage
        fail_ci_if_error: false

  build:
    name: Build and Package
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'release'
    
    strategy:
      matrix:
        runtime: [win-x64, win-x86, win-arm64]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
      
    - name: Build
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore
      
    - name: Publish
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          --runtime ${{ matrix.runtime }} `
          --self-contained true `
          --output ./publish/${{ matrix.runtime }} `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=true `
          -p:IncludeNativeLibrariesForSelfExtract=true
          
    - name: Copy additional files
      run: |
        Copy-Item "${{ env.PROJECT_PATH }}/README.md" "./publish/${{ matrix.runtime }}/"
        Copy-Item "${{ env.PROJECT_PATH }}/appsettings.json" "./publish/${{ matrix.runtime }}/"
        New-Item -Path "./publish/${{ matrix.runtime }}/QueryHistory" -ItemType Directory -Force
        New-Item -Path "./publish/${{ matrix.runtime }}/Exports" -ItemType Directory -Force
        New-Item -Path "./publish/${{ matrix.runtime }}/ConfigBackups" -ItemType Directory -Force
        
    - name: Create ZIP package
      run: |
        $version = if ($env:GITHUB_REF -match 'refs/tags/(.*)') { $matches[1] } else { "dev-$(Get-Date -Format 'yyyyMMdd-HHmmss')" }
        Compress-Archive -Path "./publish/${{ matrix.runtime }}/*" -DestinationPath "./FHIRQueryBuilder-${{ matrix.runtime }}-$version.zip"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: FHIRQueryBuilder-${{ matrix.runtime }}
        path: ./FHIRQueryBuilder-${{ matrix.runtime }}-*.zip
        retention-days: 30

  security-scan:
    name: Security Scan
    runs-on: windows-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
      
    - name: Run security scan
      run: |
        dotnet list ${{ env.PROJECT_PATH }} package --vulnerable --include-transitive
        
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: csharp
        
    - name: Build for CodeQL
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release
      
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  release:
    name: Create Release
    needs: [test, build, security-scan]
    runs-on: windows-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: ./artifacts
        
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/**/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/fhir-query-builder
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./FHIRQueryBuilder
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  notify:
    name: Notify
    needs: [test, build, security-scan]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.test.result == 'success' && needs.build.result == 'success' && needs.security-scan.result == 'success'
      run: echo "✅ All checks passed successfully!"
      
    - name: Notify on failure
      if: needs.test.result == 'failure' || needs.build.result == 'failure' || needs.security-scan.result == 'failure'
      run: |
        echo "❌ Pipeline failed!"
        echo "Test: ${{ needs.test.result }}"
        echo "Build: ${{ needs.build.result }}"
        echo "Security: ${{ needs.security-scan.result }}"
