<?xml version="1.0" encoding="UTF-8"?>
<!--
  FHIR Query Builder  app icon (vector master).
  Concept: clinical data search  magnifying lens over abstract resource rows (FHIR-like structured query).
  Brand: aligns with Bootstrap primary #0d6efd used in the Blazor shell.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FHIR Query Builder">
  <defs>
    <linearGradient id="qb-bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d8bfd"/>
      <stop offset="100%" stop-color="#0a58ca"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#qb-bg)"/>
  <!-- Lens -->
  <circle cx="214" cy="214" r="108" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>
  <!-- Handle -->
  <path d="M298 298 L396 396" fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round"/>
  <!-- Abstract resource rows inside lens (query / document hint) -->
  <g stroke="#dbeafe" stroke-width="14" stroke-linecap="round" opacity="0.95">
    <line x1="156" y1="190" x2="268" y2="190"/>
    <line x1="156" y1="218" x2="248" y2="218"/>
    <line x1="156" y1="246" x2="232" y2="246"/>
  </g>
</svg>
